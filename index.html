<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>dearlipu — Saurav Panda | Portfolio</title>
  <meta name="description" content="Visual portfolio of Saurav 'dearlipu' Panda — artist, museum manager, content creator and tech support (NextGen).">
  <meta name="keywords" content="Saurav Panda, dearlipu, OdiArt Museum, NextGen, portfolio, photography, art, tech support">

  <style>
    html,body{
      height:100%;
      margin:0;
      padding:0;
      overflow-x:hidden;
      background:#000;
      font-family:-apple-system,system-ui,Segoe UI,Roboto,sans-serif;
    }

    #viewer{
      width:100vw;
      height:100vh;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    .wrap{
      width:100%;
      margin:0;
      padding:0;
    }

    .page{
      margin:0;
      padding:0;
      line-height:0;
    }

    .page img{
      width:100vw;
      height:auto;
      margin:0;
      border:0;
      display:block;
      object-fit:cover;
      user-select:none;
    }

    .sep{
      height:0;
      margin:0;
      padding:0;
    }

    /* -------- SKELETON LOADER (from 1st code, full viewport) -------- */
    #loader{
      position:fixed;
      inset:0;
      background:#000;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:9999;
    }

    .skeleton{
      width:100vw;
      height:100vh;
      background:linear-gradient(90deg,#1f1f1f 0px,#2b2b2b 40px,#1f1f1f 80px);
      background-size:600px 100%;
      animation:skeleton-loading 1.4s infinite ease-in-out;
      margin:0;
      padding:0;
      border:0;
    }

    @keyframes skeleton-loading{
      0%{ background-position:-600px 0; }
      100%{ background-position:600px 0; }
    }

    /* ---- GLASS FLOATING CONTROLS (RIGHT) ---- */
    #floatSingle{
      position:fixed;
      right:20px;
      bottom:20px;
      z-index:14000;
      display:flex;
      align-items:center;
      gap:12px;
      pointer-events:none;
      transition:opacity .2s ease, transform .2s ease;
    }

    .glass-btn{
      pointer-events:auto;
      width:44px;
      height:44px;
      border-radius:100px;
      /* darker glass */
      background:linear-gradient(180deg,rgba(20,20,20,0.95),rgba(0,0,0,0.92));
      border:1px solid rgba(255,255,255,0.12);
      backdrop-filter:blur(20px) saturate(120%);
      -webkit-backdrop-filter:blur(20px) saturate(120%);
      box-shadow:0 14px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
      display:grid;
      place-items:center;
      cursor:pointer;
      color:#fff;
      transition:transform .20s, box-shadow .20s, opacity .20s;
      position:relative;
    }

    .glass-btn::before{
      content:'';
      position:absolute;
      inset:-8px;
      border-radius:28px;
      background:linear-gradient(90deg,rgba(124,58,237,0.16),rgba(6,182,212,0.16));
      filter:blur(18px);
      opacity:0;
      transition:opacity .25s;
    }
    .glass-btn:hover::before{
      opacity:1;
    }

    .glass-btn:hover{
      transform:translateY(-6px) scale(1.03);
    }
    .glass-btn:active{
      transform:scale(0.96);
    }

    #mainBtn svg path{
      stroke:white;
      stroke-width:2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    /* Resume Pill */
    #downloadMini{
      pointer-events:auto;
      display:flex;
      align-items:center;
      gap:8px;
      height:44px;
      padding:0 14px;
      border-radius:999px;
      background:linear-gradient(180deg,rgba(20,20,20,0.95),rgba(0,0,0,0.9));
      border:1px solid rgba(255,255,255,0.14);
      backdrop-filter:blur(20px) saturate(120%);
      -webkit-backdrop-filter:blur(20px) saturate(120%);
      box-shadow:0 14px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
      color:#fff;
      text-decoration:none;
      font-weight:700;
      font-size:15px;
      transform:translateX(-6px);
      transition:transform .20s, opacity .20s;
      white-space:nowrap;
    }

    #downloadMini:hover{
      transform:translateX(-10px) translateY(-4px);
    }

    .float-hidden{
      opacity:0;
      transform:translateY(12px) scale(0.95);
      pointer-events:none;
    }

    /* ---- SOCIAL FLOAT (LEFT) ---- */
    #socialFloat{
      position:fixed;
      left:20px;
      bottom:20px;
      z-index:14000;
      display:flex;
      align-items:flex-end;
      pointer-events:none;
      transition:opacity .2s ease, transform .2s ease;
    }

    #socialBtn{
      pointer-events:auto;
    }

    #socialBtn svg path{
      stroke:white;
      stroke-width:2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    /* Pill-style dark glass social menu */
    #socialMenu{
      position:absolute;
      bottom:54px;
      left:0;
      padding:7px 10px;
      border-radius:999px;
      background:linear-gradient(180deg,rgba(8,8,8,0.98),rgba(0,0,0,0.98));
      border:1px solid rgba(255,255,255,0.12);
      box-shadow:0 18px 55px rgba(0,0,0,0.9);
      display:flex;
      align-items:center;
      gap:6px;
      opacity:0;
      transform:translateY(10px) scale(0.97);
      pointer-events:none;
      transition:opacity .18s ease, transform .18s ease;
      white-space:nowrap;
    }

    #socialMenu.open{
      opacity:1;
      transform:translateY(0) scale(1);
      pointer-events:auto;
    }

    .social-item{
      width:36px;
      height:36px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,0.04);
      cursor:pointer;
      text-decoration:none;
      position:relative;
    }

    .social-item svg{
      width:18px;
      height:18px;
      fill:none;
      stroke:#f5f5f5;
      stroke-width:1.7;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .social-item:hover{
      background:rgba(255,255,255,0.10);
    }

    .social-item::after{
      content:attr(data-label);
      position:absolute;
      bottom:44px;
      left:50%;
      transform:translateX(-50%);
      background:rgba(0,0,0,0.9);
      color:#f5f5f5;
      padding:3px 8px;
      border-radius:999px;
      font-size:10px;
      letter-spacing:.04em;
      text-transform:uppercase;
      opacity:0;
      pointer-events:none;
      white-space:nowrap;
      transition:opacity .15s ease, transform .15s ease;
    }

    .social-item:hover::after{
      opacity:1;
      transform:translateX(-50%) translateY(-2px);
    }

    /* Hide tooltips on small screens */
    @media (max-width:600px){
      .social-item::after{
        display:none;
      }
    }
  </style>
</head>

<body>

  <div id="loader"></div>

  <div id="viewer">
    <div class="wrap" id="wrap"></div>
  </div>

  <!-- --------- FLOATING BUTTON GROUP (RIGHT) ----------- -->
  <div id="floatSingle" class="float-hidden">
    <a id="downloadMini" href="assets/files/saurav_panda_resume.pdf" download>
      Resume ⤵
    </a>

    <button id="mainBtn" class="glass-btn" aria-label="Scroll up/down">
      <!-- Scroll icon similar to your 1st code (down arrow toggling to up) -->
      <svg id="mainIcon" width="26" height="26" viewBox="0 0 24 24">
        <path id="arrowPath" d="M6 9l6 6 6-6"></path>
      </svg>
    </button>
  </div>

  <!-- --------- SOCIAL FLOAT (LEFT) ----------- -->
  <div id="socialFloat" class="float-hidden">
    <button id="socialBtn" class="glass-btn" aria-label="Open social links">
      <!-- share / nodes icon -->
      <svg width="22" height="22" viewBox="0 0 24 24">
        <path d="M7 12a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5Zm10-10a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5Zm0 12a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5ZM9.2 13.4l5.7 2.9M14.9 7.7 9.4 11"></path>
      </svg>
    </button>

    <!-- pill dropdown with icons -->
    <div id="socialMenu">
      <!-- Instagram -->
      <a class="social-item" data-label="Instagram" href="https://instagram.com/dearlipu" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24">
          <rect x="4" y="4" width="16" height="16" rx="4"></rect>
          <circle cx="12" cy="12" r="4"></circle>
          <circle cx="17.3" cy="6.7" r="1.1"></circle>
        </svg>
      </a>

      <!-- GitHub -->
      <a class="social-item" data-label="GitHub" href="https://github.com/dearlipu" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24">
          <path d="M9 18.3c-3 .9-3-1.5-4.2-1.8M15 18.3v-2.4c0-.7-.2-1.2-.6-1.6 2.1-.2 4.3-1 4.3-4.5 0-1-.3-1.8-.9-2.5.1-.2.4-1.1-.1-2.3 0 0-.8-.3-2.6.9-.8-.2-1.6-.3-2.4-.3s-1.6.1-2.4.3C5.5 4.9 4.7 5.2 4.7 5.2c-.5 1.2-.2 2.1-.1 2.3-.6.7-.9 1.5-.9 2.5 0 3.5 2.2 4.3 4.3 4.5-.3.3-.5.7-.6 1.3"></path>
        </svg>
      </a>

      <!-- YouTube -->
      <a class="social-item" data-label="YouTube" href="https://youtube.com" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24">
          <rect x="3.5" y="7" width="17" height="10" rx="3"></rect>
          <path d="M11 10.5 14.5 12 11 13.5Z"></path>
        </svg>
      </a>

      <!-- Email -->
      <a class="social-item" data-label="Email" href="mailto:contact@dearlipu.in">
        <svg viewBox="0 0 24 24">
          <rect x="4" y="5" width="16" height="14" rx="2"></rect>
          <path d="M5 7.5 12 12l7-4.5"></path>
        </svg>
      </a>
    </div>
  </div>

  <script>
  /* --------- IMAGE LOADER ----------- */
  (function(){
    const wrap   = document.getElementById('wrap');
    const loader = document.getElementById('loader');
    const folder = 'assets/pages/';
    const base   = 'page-';
    const tryExt = ['png','jpg','webp','gif'];

    let idx  = 1;
    let miss = 0;

    function exists(url){
      return new Promise(res => {
        const i = new Image();
        i.onload  = () => res(true);
        i.onerror = () => res(false);
        i.src = url;
      });
    }

    function addImg(url){
      const p   = document.createElement('div');
      p.className = 'page';

      const img = document.createElement('img');
      img.src   = url;
      img.loading = 'lazy';
      // lightbox removed as you requested – no onclick

      p.appendChild(img);
      wrap.appendChild(p);

      const sep = document.createElement('div');
      sep.className = 'sep';
      wrap.appendChild(sep);
    }

    function buildSkeleton(){
      loader.innerHTML = '<div class="skeleton"></div>';
    }

    async function scan(){
      buildSkeleton();

      for(let n=1;n<300;n++){
        let ok = false;
        for(const ext of tryExt){
          const path = `${folder}${base}${idx}.${ext}`;
          // sequential check
          // eslint-disable-next-line no-await-in-loop
          if(await exists(path)){
            addImg(path);
            ok = true;
            break;
          }
        }
        if(!ok){
          miss++;
          if(miss>=6) break;   // stop if several consecutive pages missing
        } else {
          miss = 0;
        }
        idx++;
      }

      loader.style.transition = 'opacity 0.3s ease';
      loader.style.opacity = '0';
      setTimeout(() => loader.remove(), 300);
    }

    scan();
  })();

  /* --------- FLOATING CONTROL LOGIC (SCROLL + AUTOHIDE) ----------- */
  (function(){
    const viewer      = document.getElementById('viewer');
    const btn         = document.getElementById('mainBtn');
    const arrow       = document.getElementById('arrowPath');
    const floatRight  = document.getElementById('floatSingle');
    const floatLeft   = document.getElementById('socialFloat');
    const socialMenu  = document.getElementById('socialMenu');

    function botRemain(){
      return viewer.scrollHeight - (viewer.scrollTop + viewer.clientHeight);
    }

    function goTop(){
      viewer.scrollTo({top:0, behavior:'smooth'});
    }

    function goBottom(){
      viewer.scrollTo({top:viewer.scrollHeight, behavior:'smooth'});
    }

    function updateIcon(){
      // down arrow when not near bottom, up arrow when near bottom
      if(botRemain() < 80){
        arrow.setAttribute('d','M6 15l6-6 6 6');  // up arrow
      } else {
        arrow.setAttribute('d','M6 9l6 6 6-6');   // down arrow
      }
    }

    btn.onclick = () => botRemain() < 80 ? goTop() : goBottom();

    let timer = null;
    function show(){
      floatRight.classList.remove('float-hidden');
      floatLeft.classList.remove('float-hidden');

      if(timer) clearTimeout(timer);

      // if social menu is open, don't auto-hide
      if(socialMenu && socialMenu.classList.contains('open')) return;

      timer = setTimeout(() => {
        floatRight.classList.add('float-hidden');
        floatLeft.classList.add('float-hidden');
      }, 2100);
    }

    viewer.addEventListener('scroll', () => { updateIcon(); show(); });
    viewer.addEventListener('mousemove', show);
    viewer.addEventListener('touchstart', show);

    updateIcon();
    show();
  })();

  /* --------- SOCIAL DROPDOWN LOGIC ----------- */
  (function(){
    const socialBtn   = document.getElementById('socialBtn');
    const socialMenu  = document.getElementById('socialMenu');
    const socialFloat = document.getElementById('socialFloat');

    function toggleMenu(e){
      e.stopPropagation();
      const isOpen = socialMenu.classList.contains('open');
      if(isOpen){
        socialMenu.classList.remove('open');
      } else {
        socialMenu.classList.add('open');
        // when opened, ensure float is visible (do not hide)
        socialFloat.classList.remove('float-hidden');
      }
    }

    function closeMenu(){
      socialMenu.classList.remove('open');
    }

    socialBtn.addEventListener('click', toggleMenu);

    // Close when click outside (with small delay to avoid instant close on same click)
    document.addEventListener('click', (e) => {
      setTimeout(() => {
        if(!socialFloat.contains(e.target)){
          closeMenu();
        }
      }, 50);
    });
  })();
  </script>

</body>
</html>
