<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Portfolio</title>

<style>
  /* Page reset & hide overflow */
  html,body{height:100%;margin:0;padding:0;background:#000;overflow-x:hidden;}
  /* viewer uses full width and scrolls vertically */
  #viewer{width:100vw;height:100vh;overflow:auto;-webkit-overflow-scrolling:touch;margin:0;padding:0;box-sizing:border-box;}
  /* wrapper holds stacked pages; full width (no max-width) */
  .wrap{width:100%;margin:0;padding:0;box-sizing:border-box;}
  /* each page block: zero margins to avoid gaps */
  .page{display:block;margin:0;padding:0;line-height:0;background:transparent;}
  /* make the image fill the viewport width exactly (no side gutters).
     We keep aspect ratio by setting width:100vw; height:auto.
     This causes pages of different aspect ratios to have different heights (expected).
  */
  .page img{
    display:block;
    width:100vw;
    height:auto;
    margin:0;
    padding:0;
    border:0;
    object-fit:cover; /* helps when used with fixed height fallback */
    background:transparent;
    -webkit-user-select:none;
    user-select:none;
  }

  /* vertical separator: zero height for absolute no-gap; change if you want small gap */
  .sep{height:0;margin:0;padding:0;background:transparent;}

  /* Loader */
  #loader{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:9999;background:rgba(0,0,0,0.6);color:#fff;padding:10px 14px;border-radius:8px;font-weight:700;}

  /* Lightbox */
  .lb{position:fixed;inset:0;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;z-index:10000}
  .lb img{max-width:98vw;max-height:96vh;width:auto;height:auto;box-shadow:0 24px 80px rgba(0,0,0,0.8)}
  .lb-close{position:fixed;top:16px;right:16px;padding:8px 12px;border-radius:8px;background:rgba(255,255,255,0.06);color:#fff;font-weight:700;cursor:pointer;z-index:10001}

  /* small-screen tweaks */
  @media (max-width:700px){
    .page img{ width:100vw; } /* keep same behavior */
    #loader{font-size:14px;padding:8px 10px}
  }

  /* Floating controls: top, bottom, resume */
#float-controls {
  position: fixed;
  right: 18px;
  bottom: 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  z-index: 12000;
  pointer-events: none; /* allow precise per-button pointer control */
}

.btn-floater {
  pointer-events: auto;
  width: 52px;
  height: 52px;
  border-radius: 12px;
  display: inline-grid;
  place-items: center;
  background: rgba(0,0,0,0.54);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.06);
  box-shadow: 0 8px 28px rgba(2,6,23,0.5);
  cursor: pointer;
  transition: transform .18s ease, opacity .18s ease, background .18s ease;
  -webkit-tap-highlight-color: transparent;
  backdrop-filter: blur(6px);
  user-select: none;
}
.btn-floater:active { transform: translateY(1px) scale(.995); }
.btn-floater:hover { transform: translateY(-3px) }

/* Resume button slightly larger and labeled */
#resumeBtn {
  width: 56px;
  height: 56px;
  border-radius: 14px;
  font-weight:700;
  font-size:13px;
  padding:6px;
  background: linear-gradient(180deg,#7c3aed,#5b21b6);
}

/* hidden state for auto-hide */
.float-hidden { opacity: 0; transform: translateY(8px) scale(.98); pointer-events: none; }

/* small-screen: nudge left a bit to avoid system gestures */
@media (max-width:420px) {
  #float-controls { right: 12px; bottom: 18px; gap:10px; }
  .btn-floater { width:48px; height:48px; border-radius:12px; }
  #resumeBtn { width:52px; height:52px; border-radius:12px; font-size:12px; }
}

</style>
</head>
<body>

<div id="loader">Loading images…</div>
<div id="viewer"><div class="wrap" id="wrap"></div></div>

<script>
(function(){
  const wrap = document.getElementById('wrap');
  const loader = document.getElementById('loader');

  const folder = 'assets/pages/';
  const base = 'page-';
  const start = 1;
  const maxAttempts = 300;           // safety upper bound
  const consecutiveMissingStop = 6;  // stop scanning after this many misses
  const tryExt = ['png','jpg','webp','gif']; // order to try

  // tiny async existence check by creating Image (uses browser cache if image already requested)
  function exists(url, timeout=6000){
    return new Promise(resolve=>{
      const img = new Image();
      let done=false;
      const t = setTimeout(()=>{ if(!done){done=true; img.src=''; resolve(false);} }, timeout);
      img.onload = ()=>{ if(!done){ done=true; clearTimeout(t); resolve(true); } };
      img.onerror = ()=>{ if(!done){ done=true; clearTimeout(t); resolve(false); } };
      img.decoding='async';
      img.src = url;
    });
  }

  function appendImage(url, idx){
    const page = document.createElement('div');
    page.className = 'page';
    const img = document.createElement('img');
    img.src = url;
    img.alt = 'Page ' + idx;
    img.loading = 'lazy';
    img.decoding = 'async';
    img.addEventListener('click', ()=>openLightbox(url));
    page.appendChild(img);
    wrap.appendChild(page);
    // separator (zero height)
    const sep = document.createElement('div');
    sep.className = 'sep';
    wrap.appendChild(sep);
  }

  function openLightbox(src){
    // remove existing
    const existing = document.querySelector('.lb');
    if(existing) existing.remove();
    const lb = document.createElement('div'); lb.className='lb';
    const img = document.createElement('img'); img.src = src;
    const close = document.createElement('div'); close.className='lb-close'; close.textContent='Close';
    close.onclick = ()=>document.body.removeChild(lb);
    lb.onclick = (e)=>{ if(e.target===lb) document.body.removeChild(lb); };
    lb.appendChild(img); lb.appendChild(close);
    document.body.appendChild(lb);
  }

  (async function scan(){
    loader.textContent = 'Scanning images…';
    let idx = start;
    let consecutiveMissing = 0;
    let foundAny = false;

    for(let attempt=0; attempt<maxAttempts; attempt++, idx++){
      let found=false;
      for(const ext of tryExt){
        const url = folder + base + idx + '.' + ext;
        // NOTE: if your repo is a project page and uses a subpath, leading slash could break. This relative path works.
        const ok = await exists(url);
        if(ok){
          appendImage(url, idx);
          found=true; foundAny=true; consecutiveMissing=0; break;
        }
      }
      if(!found) consecutiveMissing++;
      if(consecutiveMissing >= consecutiveMissingStop) break;
    }

    if(!foundAny){
      loader.textContent = 'No images found. Upload files named: ' + folder + base + '1.png';
    }else{
      loader.style.display = 'none';
    }
  })();
})();

  // Floating quick controls behaviour
(function(){
  const viewer = document.getElementById('viewer') || window; // fallback to window if no viewer container
  const controls = document.getElementById('float-controls');
  const topBtn = document.getElementById('jumpTop');
  const bottomBtn = document.getElementById('jumpBottom');
  const resumeBtn = document.getElementById('resumeBtn');

  // Safety: if missing elements, stop
  if(!controls || !topBtn || !bottomBtn || !resumeBtn) return;

  // Scroll actions: smooth scroll inside viewer (if exists) else page
  function scrollToTop() {
    if(viewer === window) window.scrollTo({ top:0, behavior:'smooth' });
    else viewer.scrollTo({ top: 0, behavior: 'smooth' });
  }
  function scrollToBottom() {
    if(viewer === window) window.scrollTo({ top: document.body.scrollHeight, behavior:'smooth' });
    else viewer.scrollTo({ top: viewer.scrollHeight, behavior: 'smooth' });
  }

  topBtn.addEventListener('click', scrollToTop);
  bottomBtn.addEventListener('click', scrollToBottom);

  // Auto-hide logic:
  // - show controls when user moves mouse, touches screen, or scrolls inside viewer
  // - hide after X ms of inactivity
  let hideTimer = null;
  const HIDE_AFTER = 3500; // ms idle before hiding

  function showControls() {
    controls.classList.remove('float-hidden');
    // reset hide timer
    if(hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
    hideTimer = setTimeout(()=>controls.classList.add('float-hidden'), HIDE_AFTER);
  }

  function initHideTimer() {
    // show initially then schedule hide
    showControls();
  }

  // Events to wake controls
  const wakeEvents = ['mousemove','keydown','touchstart','wheel'];
  wakeEvents.forEach(ev => {
    // attach to viewer if it exists, else window
    (viewer === window ? window : viewer).addEventListener(ev, showControls, { passive: true });
  });

  // Also show on clicking anywhere
  (viewer === window ? window : viewer).addEventListener('click', showControls, { passive: true });

  // Also show when the resume button is hovered (desktop)
  resumeBtn.addEventListener('mouseenter', showControls);

  // Start timer
  initHideTimer();

  // Accessibility: show controls when focusing via keyboard
  document.addEventListener('focusin', showControls);

  // Optional: hide controls when viewer is near top (so they don't overlay initial hero)
  function updateVisibilityBasedOnScroll(){
    let scrollTop = (viewer === window) ? window.scrollY : viewer.scrollTop;
    // hide Top button if already near top
    if(scrollTop < 80) topBtn.style.opacity = '0.45';
    else topBtn.style.opacity = '1';
    // hide Bottom button if near bottom
    let distanceToBottom = (viewer === window) ? (document.body.scrollHeight - (window.scrollY + window.innerHeight)) : (viewer.scrollHeight - (viewer.scrollTop + viewer.clientHeight));
    if(distanceToBottom < 120) bottomBtn.style.opacity = '0.45';
    else bottomBtn.style.opacity = '1';
  }
  (viewer === window ? window : viewer).addEventListener('scroll', ()=>{
    showControls(); updateVisibilityBasedOnScroll();
  }, { passive:true });

  // Initial visibility update
  updateVisibilityBasedOnScroll();

  // If you want to auto-hide the resume button specifically when user scrolls (optional),
  // uncomment next lines:
  // (viewer === window ? window : viewer).addEventListener('scroll', () => {
  //   resumeBtn.style.opacity = '0.0'; // hide
  //   // show back after a short delay
  //   clearTimeout(hideTimer);
  //   hideTimer = setTimeout(()=>resumeBtn.style.opacity = '1.0', 1200);
  // }, { passive:true });

})();

</script>

  <!-- Floating controls: Top, Resume, Bottom -->
<div id="float-controls" aria-hidden="false">
  <button id="jumpTop" class="btn-floater" title="Go to top" aria-label="Go to top">
    <!-- Up arrow SVG -->
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden>
      <path d="M6 15l6-6 6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <a id="resumeBtn" class="btn-floater" href="portfolio.pdf" target="_blank" rel="noopener" download title="Download Resume (PDF)" aria-label="Download Resume">
    <!-- File / download SVG + small label -->
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden>
      <path d="M12 3v12" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M8 11l4 4 4-4" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="3.5" y="3.5" width="17" height="17" rx="2.5" stroke="white" stroke-opacity="0.12" stroke-width="1.2"/>
    </svg>
  </a>

  <button id="jumpBottom" class="btn-floater" title="Go to bottom" aria-label="Go to bottom">
    <!-- Down arrow SVG -->
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden>
      <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>

</body>
</html>
