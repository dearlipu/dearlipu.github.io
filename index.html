<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Saurav Panda — Portfolio</title>
  <meta name="robots" content="index, follow" />
  <style>
    /* Make page empty and the viewer take the whole screen */
    html,body{
      height:100%;
      margin:0;
      background:#000;
    }
    /* iframe fills the viewport */
    .pdf-frame{
      position:fixed;
      inset:0; /* top:0; right:0; bottom:0; left:0 */
      width:100%;
      height:100%;
      border:0;
      background:#000;
    }
    /* Fallback message (visible when iframe blocked) */
    .fallback{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#000;
      color:#fff;
      padding:20px;
      box-sizing:border-box;
      text-align:center;
      font-family:system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      font-size:16px;
    }
    .fallback a{
      color:#fff;
      text-decoration:underline;
      font-weight:700;
    }
  </style>
</head>
<body>
  <!-- Embed PDF. Adjust path if your PDF has a different name or is in a folder -->
  <iframe
    class="pdf-frame"
    src="portfolio.pdf#toolbar=0&navpanes=0&view=FitH"
    allowfullscreen
    title="Portfolio PDF">
  </iframe>

  <!-- Fallback for devices that block embedded PDFs -->
  <div class="fallback" aria-hidden="false">
    <div>
      <p style="margin:0 0 12px 0">This device may not be able to preview PDFs inline.</p>
      <p style="margin:0">
        <a href="portfolio.pdf" target="_blank" rel="noopener">Open / download the portfolio PDF</a>
      </p>
    </div>
  </div>

  <script>
    // Hide fallback if iframe successfully loads content (best-effort)
    (function(){
      var iframe = document.querySelector('.pdf-frame');
      var fallback = document.querySelector('.fallback');

      // If the iframe loads (onload), hide fallback.
      // Note: on some browsers cross-origin onload may behave differently but this helps.
      iframe.addEventListener('load', function(){
        // brief timeout to allow rendering
        setTimeout(function(){ fallback.style.display = 'none'; }, 300);
      });

      // Extra: if screen is very small, prefer showing the direct link (optional)
      if (window.innerWidth < 420) {
        // some mobile browsers handle PDFs poorly — show fallback link by keeping it visible
        // comment out the next line if you still want iframe on small phones
        // iframe.style.display = 'none';
      }
    })();
  </script>
</body>
</html>
