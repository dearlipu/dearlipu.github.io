<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Portfolio</title>

<style>
  /* Page reset & hide overflow */
  html,body{height:100%;margin:0;padding:0;background:#000;overflow-x:hidden;}
  /* viewer uses full width and scrolls vertically */
  #viewer{width:100vw;height:100vh;overflow:auto;-webkit-overflow-scrolling:touch;margin:0;padding:0;box-sizing:border-box;}
  /* wrapper holds stacked pages; full width (no max-width) */
  .wrap{width:100%;margin:0;padding:0;box-sizing:border-box;}
  /* each page block: zero margins to avoid gaps */
  .page{display:block;margin:0;padding:0;line-height:0;background:transparent;}
  /* make the image fill the viewport width exactly (no side gutters).
     We keep aspect ratio by setting width:100vw; height:auto.
     This causes pages of different aspect ratios to have different heights (expected).
  */
  .page img{
    display:block;
    width:100vw;
    height:auto;
    margin:0;
    padding:0;
    border:0;
    object-fit:cover; /* helps when used with fixed height fallback */
    background:transparent;
    -webkit-user-select:none;
    user-select:none;
  }

  /* vertical separator: zero height for absolute no-gap; change if you want small gap */
  .sep{height:0;margin:0;padding:0;background:transparent;}

  /* Loader */
  #loader{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:9999;background:rgba(0,0,0,0.6);color:#fff;padding:10px 14px;border-radius:8px;font-weight:700;}

  /* Lightbox */
  .lb{position:fixed;inset:0;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;z-index:10000}
  .lb img{max-width:98vw;max-height:96vh;width:auto;height:auto;box-shadow:0 24px 80px rgba(0,0,0,0.8)}
  .lb-close{position:fixed;top:16px;right:16px;padding:8px 12px;border-radius:8px;background:rgba(255,255,255,0.06);color:#fff;font-weight:700;cursor:pointer;z-index:10001}

  /* small-screen tweaks */
  @media (max-width:700px){
    .page img{ width:100vw; } /* keep same behavior */
    #loader{font-size:14px;padding:8px 10px}
  }
  
/* --- Floating single button + mini download --- */
#floatSingle {
  position: fixed;
  right: 18px;
  bottom: 20px;
  z-index: 14000;
  display: flex;
  align-items: center;
  gap: 10px;
  pointer-events: none; /* enable per-button pointer control */
}

/* main button (arrow) */
#mainBtn {
  pointer-events: auto;
  width: 56px;
  height: 56px;
  border-radius: 14px;
  background: linear-gradient(180deg,#101316,#0b0f12);
  color: #fff;
  display: inline-grid;
  place-items: center;
  font-size: 22px;
  border: 1px solid rgba(255,255,255,0.06);
  box-shadow: 0 12px 40px rgba(2,6,23,0.6);
  cursor: pointer;
  transition: transform .16s ease, opacity .18s ease;
  backdrop-filter: blur(6px);
  user-select: none;
}

/* mini download button attached left of main */
#downloadMini {
  pointer-events: auto;
  width: 42px;
  height: 42px;
  border-radius: 12px;
  background: linear-gradient(180deg,#7c3aed,#5b21b6);
  display:inline-grid;
  place-items:center;
  color:#fff;
  border:1px solid rgba(0,0,0,0.12);
  box-shadow:0 10px 30px rgba(0,0,0,0.45);
  transform: translateX(-6px);
  cursor:pointer;
  text-decoration:none;
}

/* small label on hover (optional) */
#downloadMini:hover::after{
  content: "Resume";
  position: absolute;
  right: 70px;
  background: rgba(0,0,0,0.72);
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 13px;
  color: #fff;
  white-space:nowrap;
  box-shadow:0 8px 20px rgba(0,0,0,0.6);
}

/* hidden state for auto-hide */
.float-hidden { opacity: 0; transform: translateY(12px) scale(.98); pointer-events: none; }

/* touch targets for small screens */
@media (max-width:420px){
  #mainBtn{ width:50px; height:50px; border-radius:12px; font-size:20px; }
  #downloadMini{ width:40px; height:40px; border-radius:10px; }
}
  
</style>
</head>
<body>

<div id="loader">Loading images…</div>
<div id="viewer"><div class="wrap" id="wrap"></div></div>

  <!-- Floating single control (main arrow + mini download) -->
<div id="floatSingle" aria-hidden="false">
  <a id="downloadMini" href="portfolio.pdf" target="_blank" rel="noopener" title="Download resume (PDF)">
    <!-- download SVG -->
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden>
      <path d="M12 3v12" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M8 11l4 4 4-4" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="3.5" y="3.5" width="17" height="17" rx="2.5" stroke="white" stroke-opacity="0.08" stroke-width="1.2"/>
    </svg>
  </a>

  <button id="mainBtn" aria-label="Scroll to top or bottom" title="Scroll to top / bottom">
    <!-- arrow path, direction will be toggled by JS -->
    <svg id="mainIcon" width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden>
      <path id="arrowPath" d="M6 15l6-6 6 6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>

<script>
(function(){
  const wrap = document.getElementById('wrap');
  const loader = document.getElementById('loader');

  const folder = 'assets/pages/';
  const base = 'page-';
  const start = 1;
  const maxAttempts = 300;           // safety upper bound
  const consecutiveMissingStop = 6;  // stop scanning after this many misses
  const tryExt = ['png','jpg','webp','gif']; // order to try

  // tiny async existence check by creating Image (uses browser cache if image already requested)
  function exists(url, timeout=6000){
    return new Promise(resolve=>{
      const img = new Image();
      let done=false;
      const t = setTimeout(()=>{ if(!done){done=true; img.src=''; resolve(false);} }, timeout);
      img.onload = ()=>{ if(!done){ done=true; clearTimeout(t); resolve(true); } };
      img.onerror = ()=>{ if(!done){ done=true; clearTimeout(t); resolve(false); } };
      img.decoding='async';
      img.src = url;
    });
  }

  function appendImage(url, idx){
    const page = document.createElement('div');
    page.className = 'page';
    const img = document.createElement('img');
    img.src = url;
    img.alt = 'Page ' + idx;
    img.loading = 'lazy';
    img.decoding = 'async';
    img.addEventListener('click', ()=>openLightbox(url));
    page.appendChild(img);
    wrap.appendChild(page);
    // separator (zero height)
    const sep = document.createElement('div');
    sep.className = 'sep';
    wrap.appendChild(sep);
  }

  function openLightbox(src){
    // remove existing
    const existing = document.querySelector('.lb');
    if(existing) existing.remove();
    const lb = document.createElement('div'); lb.className='lb';
    const img = document.createElement('img'); img.src = src;
    const close = document.createElement('div'); close.className='lb-close'; close.textContent='Close';
    close.onclick = ()=>document.body.removeChild(lb);
    lb.onclick = (e)=>{ if(e.target===lb) document.body.removeChild(lb); };
    lb.appendChild(img); lb.appendChild(close);
    document.body.appendChild(lb);
  }

  (async function scan(){
    loader.textContent = 'Scanning images…';
    let idx = start;
    let consecutiveMissing = 0;
    let foundAny = false;

    for(let attempt=0; attempt<maxAttempts; attempt++, idx++){
      let found=false;
      for(const ext of tryExt){
        const url = folder + base + idx + '.' + ext;
        // NOTE: if your repo is a project page and uses a subpath, leading slash could break. This relative path works.
        const ok = await exists(url);
        if(ok){
          appendImage(url, idx);
          found=true; foundAny=true; consecutiveMissing=0; break;
        }
      }
      if(!found) consecutiveMissing++;
      if(consecutiveMissing >= consecutiveMissingStop) break;
    }

    if(!foundAny){
      loader.textContent = 'No images found. Upload files named: ' + folder + base + '1.png';
    }else{
      loader.style.display = 'none';
    }
  })();
})();

(function(){
  const viewerEl = document.getElementById('viewer'); // your scroll container
  const viewer = viewerEl || window; // fallback to window if not present

  const mainBtn = document.getElementById('mainBtn');
  const mainIconPath = document.getElementById('arrowPath');
  const floatSingle = document.getElementById('floatSingle');

  if(!mainBtn || !floatSingle) return;

  // Scroll helpers
  function getScrollTop(){
    if(viewer === window) return window.scrollY || document.documentElement.scrollTop || document.body.scrollTop || 0;
    return viewer.scrollTop;
  }
  function getScrollHeight(){
    if(viewer === window) return Math.max(document.body.scrollHeight, document.documentElement.scrollHeight);
    return viewer.scrollHeight;
  }
  function getClientHeight(){
    if(viewer === window) return window.innerHeight || document.documentElement.clientHeight;
    return viewer.clientHeight;
  }

  function scrollToTop(){
    if(viewer === window) window.scrollTo({ top: 0, behavior: 'smooth' });
    else viewer.scrollTo({ top: 0, behavior: 'smooth' });
  }
  function scrollToBottom(){
    if(viewer === window) window.scrollTo({ top: getScrollHeight(), behavior: 'smooth' });
    else viewer.scrollTo({ top: viewer.scrollHeight, behavior: 'smooth' });
  }

  // toggle icon direction depending on position
  function updateIconDirection(){
    const top = getScrollTop();
    const remain = getScrollHeight() - (top + getClientHeight());
    // if near bottom show UP arrow (so clicking takes you to top), else show DOWN arrow
    if(remain < 120){
      // near bottom -> show up arrow
      mainIconPath.setAttribute('d', 'M6 15l6-6 6 6'); // up arrow (same as original)
    } else {
      // not near bottom -> show down arrow
      mainIconPath.setAttribute('d', 'M6 9l6 6 6-6'); // down arrow
    }
  }

  // click action: if near bottom -> go top; else go bottom
  mainBtn.addEventListener('click', ()=>{
    const top = getScrollTop();
    const remain = getScrollHeight() - (top + getClientHeight());
    if(remain < 120) scrollToTop(); else scrollToBottom();
    // show controls when clicked
    showControls();
  });

  // Auto-hide logic
  let hideTimer = null;
  const HIDE_AFTER = 3000; // ms
  function showControls(){
    floatSingle.classList.remove('float-hidden');
    if(hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
    hideTimer = setTimeout(()=> floatSingle.classList.add('float-hidden'), HIDE_AFTER);
  }

  // Events to show controls
  const wakeTargets = (viewer === window ? [window] : [viewer]);
  wakeTargets.forEach(t => {
    t.addEventListener('mousemove', showControls, { passive:true });
    t.addEventListener('touchstart', showControls, { passive:true });
    t.addEventListener('wheel', showControls, { passive:true });
    t.addEventListener('keydown', showControls, { passive:true });
    t.addEventListener('scroll', ()=>{ showControls(); updateIconDirection(); }, { passive:true });
  });

  // initial state
  showControls();
  updateIconDirection();

  // update icon on resize (recalculate)
  window.addEventListener('resize', updateIconDirection);

  // Accessibility: keyboard activate main button with Enter/Space
  mainBtn.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter' || e.key === ' '){
      e.preventDefault();
      mainBtn.click();
    }
  });

  // If you want to control the resume download click behavior or change filename:
  // const downloadMini = document.getElementById('downloadMini');
  // downloadMini.href = 'portfolio.pdf'; // set or change dynamically

})();

</script>

</body>
</html>
