<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Saurav Panda - Portfolio</title>

  <!-- Bootstrap Icons for social + arrow icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    html,body{
      height:100%;
      margin:0;
      padding:0;
      overflow-x:hidden;
      background:#000;
      font-family:-apple-system,system-ui,Segoe UI,Roboto,sans-serif;
    }

    #viewer{
      width:100vw;
      height:100vh;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    .wrap{
      width:100%;
      margin:0;
      padding:0;
    }

    .page{
      margin:0;
      padding:0;
      line-height:0;
    }

    .page img{
      width:100vw;
      height:auto;
      margin:0;
      border:0;
      display:block;
      object-fit:cover;
      user-select:none;
    }

    .sep{
      height:0;
      margin:0;
      padding:0;
    }

    /* ====== SKELETON LOADER ====== */
    #loader{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:radial-gradient(circle at top,rgba(40,40,40,0.9),rgba(0,0,0,0.98));
      z-index:9999;
    }

    .skeleton-wrap{
      width:100%;
      max-width:1200px;
      padding:16px;
      box-sizing:border-box;
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .skeleton-row{
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .skeleton-page{
      flex:1;
      border-radius:18px;
      padding:14px;
      background:rgba(18,18,18,0.96);
      box-shadow:0 24px 80px rgba(0,0,0,0.9);
      overflow:hidden;
    }

    .sk-thumb{
      width:100%;
      height:220px;
      border-radius:14px;
      background:linear-gradient(110deg,#1c1c1c 0px,#2b2b2b 40px,#1c1c1c 80px);
      background-size:600px 100%;
      animation:skeleton-loading 1.3s infinite ease-in-out;
      margin-bottom:10px;
    }

    .sk-line{
      height:10px;
      border-radius:999px;
      background:linear-gradient(110deg,#1a1a1a 0px,#292929 40px,#1a1a1a 80px);
      background-size:600px 100%;
      animation:skeleton-loading 1.3s infinite ease-in-out;
      margin:4px 0;
      opacity:.9;
    }

    .sk-line.short{
      width:58%;
    }

    .sk-line.medium{
      width:80%;
    }

    .sk-line.full{
      width:100%;
    }

    @keyframes skeleton-loading{
      0%{ background-position:-600px 0; }
      100%{ background-position:600px 0; }
    }

    /* Responsive skeleton */
    @media (min-width:900px){
      .skeleton-row{
        flex-direction:row;
      }
      .skeleton-page{
        padding:18px;
      }
      .sk-thumb{
        height:280px;
      }
    }

    @media (min-width:1400px){
      .skeleton-page{
        padding:24px;
      }
      .sk-thumb{
        height:360px;
      }
    }

    /* ====== FLOATING CONTROLS (SCROLL + RESUME) ====== */
    #floatSingle{
      position:fixed;
      right:20px;
      bottom:20px;
      z-index:14000;
      display:flex;
      align-items:center;
      gap:12px;
      pointer-events:none;
    }

    /* dark glass token style for all buttons */
    .glass-token{
      background:radial-gradient(circle at top,rgba(20,20,20,0.98),rgba(5,5,5,0.96));
      border:1px solid rgba(255,255,255,0.14);
      backdrop-filter:blur(18px) saturate(180%);
      -webkit-backdrop-filter:blur(18px) saturate(180%);
      box-shadow:
        0 18px 50px rgba(0,0,0,0.85),
        inset 0 1px 0 rgba(255,255,255,0.05);
      color:#f5f5f5;
    }

    #mainBtn{
      pointer-events:auto;
      width:46px;
      height:46px;
      border-radius:999px;
      border:none;
      display:grid;
      place-items:center;
      cursor:pointer;
      transition:transform .20s, box-shadow .20s, opacity .20s;
      position:relative;
    }

    #mainBtn::before{
      content:'';
      position:absolute;
      inset:-8px;
      border-radius:999px;
      background:radial-gradient(circle at top,rgba(124,58,237,0.2),rgba(6,182,212,0.05));
      filter:blur(22px);
      opacity:0;
      transition:opacity .25s;
      pointer-events:none;
    }

    #mainBtn:hover::before{
      opacity:1;
    }

    #mainBtn:hover{
      transform:translateY(-5px) scale(1.03);
    }

    #mainBtn:active{
      transform:scale(0.95);
    }

    #mainBtn svg path{
      stroke:white;
      stroke-width:1.9;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    #downloadMini{
      pointer-events:auto;
      display:flex;
      align-items:center;
      gap:8px;
      height:44px;
      padding:0 16px;
      border-radius:999px;
      text-decoration:none;
      font-weight:600;
      font-size:14px;
      transform:translateX(-6px);
      transition:transform .20s, opacity .20s;
      color:#f5f5f5;
    }

    #downloadMini i{
      font-size:16px;
    }

    #downloadMini:hover{
      transform:translateX(-10px) translateY(-3px);
    }

    .float-hidden{
      opacity:0;
      transform:translateY(12px) scale(0.95);
      pointer-events:none;
    }

    /* ====== SOCIAL BUTTON (BOTTOM LEFT) ====== */
    #socialWrap{
      position:fixed;
      left:20px;
      bottom:20px;
      z-index:14000;
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      gap:10px;
      pointer-events:none;
    }

    #socialBtn{
      pointer-events:auto;
      width:46px;
      height:46px;
      border-radius:999px;
      border:none;
      display:grid;
      place-items:center;
      cursor:pointer;
      transition:transform .20s, box-shadow .20s, opacity .20s;
      position:relative;
      color:#f5f5f5;
    }

    #socialBtn i{
      font-size:18px;
    }

    #socialBtn:hover{
      transform:translateY(-4px) scale(1.03);
    }

    #socialMenu{
      pointer-events:auto;
      margin-bottom:4px;
      padding:10px 12px;
      border-radius:999px;
      display:flex;
      align-items:center;
      gap:8px;
      opacity:0;
      transform:translateY(8px) scale(0.97);
      transition:opacity .18s ease, transform .18s ease;
      visibility:hidden;
    }

    #socialMenu.open{
      opacity:1;
      transform:translateY(0) scale(1);
      visibility:visible;
    }

    .social-pill{
      width:auto;
      padding:6px 10px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      font-size:14px;
      color:#f5f5f5;
      font-weight:600;
      gap:6px;
      transition:transform .18s ease, box-shadow .18s ease, background .18s ease;
    }

    .social-pill i{
      font-size:15px;
    }

    .social-pill:hover{
      transform:translateY(-3px);
      box-shadow:0 18px 40px rgba(0,0,0,0.8);
      background:radial-gradient(circle at top,rgba(45,45,45,1),rgba(15,15,15,1));
    }

    .social-pill--ig{
      border:1px solid rgba(236,72,153,0.6);
    }
    .social-pill--gh{
      border:1px solid rgba(148,163,184,0.7);
    }
    .social-pill--yt{
      border:1px solid rgba(248,113,113,0.7);
    }
    .social-pill--mail{
      border:1px solid rgba(56,189,248,0.7);
    }

    @media (max-width:480px){
      #floatSingle{
        right:14px;
        bottom:14px;
      }
      #socialWrap{
        left:14px;
        bottom:14px;
      }
      #downloadMini{
        display:none; /* keep only arrow on very small screens if you want */
      }
    }
  </style>
</head>

<body>

<div id="loader"></div>
<div id="viewer"><div class="wrap" id="wrap"></div></div>

<!-- --------- FLOATING BUTTON GROUP (RIGHT) ----------- -->
<div id="floatSingle">
  <a id="downloadMini" class="glass-token" href="assets/files/saurav_panda_resume.pdf" download>
    <i class="bi bi-download"></i>
    <span>Resume</span>
  </a>

  <button id="mainBtn" class="glass-token" aria-label="Scroll to top or bottom">
    <svg id="mainIcon" width="24" height="24" viewBox="0 0 24 24">
      <!-- double chevron, JS will swap d for up/down -->
      <path id="arrowPath" d="M7 15l5-5 5 5M7 11l5-5 5 5"></path>
    </svg>
  </button>
</div>

<!-- --------- SOCIAL BUTTON GROUP (LEFT) ----------- -->
<div id="socialWrap">
  <div id="socialMenu" class="glass-token">
    <a class="social-pill glass-token social-pill--ig" href="https://instagram.com/dearlipu" target="_blank" rel="noopener">
      <i class="bi bi-instagram"></i>
      <span>IG</span>
    </a>
    <a class="social-pill glass-token social-pill--gh" href="https://github.com/dearlipu" target="_blank" rel="noopener">
      <i class="bi bi-github"></i>
      <span>GitHub</span>
    </a>
    <a class="social-pill glass-token social-pill--yt" href="https://youtube.com" target="_blank" rel="noopener">
      <i class="bi bi-youtube"></i>
      <span>YouTube</span>
    </a>
    <a class="social-pill glass-token social-pill--mail" href="mailto:contact@dearlipu.in">
      <i class="bi bi-envelope-fill"></i>
      <span>Mail</span>
    </a>
  </div>

  <button id="socialBtn" class="glass-token" aria-label="Open social links">
    <i class="bi bi-share-fill"></i>
  </button>
</div>

<script>
/* --------- IMAGE LOADER ----------- */
(function(){
  const wrap   = document.getElementById('wrap');
  const loader = document.getElementById('loader');
  const folder = 'assets/pages/';
  const base   = 'page-';
  const tryExt = ['png','jpg','webp','gif'];
  let idx = 1, miss = 0;

  // build skeleton UI
  function buildSkeleton(){
    loader.innerHTML = '';
    const shell = document.createElement('div');
    shell.className = 'skeleton-wrap';

    for(let r=0;r<2;r++){
      const row = document.createElement('div');
      row.className = 'skeleton-row';

      for(let p=0;p<2;p++){
        const page = document.createElement('div');
        page.className = 'skeleton-page';

        const thumb = document.createElement('div');
        thumb.className = 'sk-thumb';
        page.appendChild(thumb);

        const l1 = document.createElement('div');
        l1.className = 'sk-line full';
        const l2 = document.createElement('div');
        l2.className = 'sk-line medium';
        const l3 = document.createElement('div');
        l3.className = 'sk-line short';

        page.appendChild(l1);
        page.appendChild(l2);
        page.appendChild(l3);

        row.appendChild(page);
      }

      shell.appendChild(row);
    }

    loader.appendChild(shell);
  }

  function exists(url){
    return new Promise(res=>{
      const i = new Image();
      i.onload  = ()=>res(true);
      i.onerror = ()=>res(false);
      i.src = url;
    });
  }

  function addImg(url){
    const p   = document.createElement('div');
    p.className = 'page';
    const img = document.createElement('img');
    img.src   = url;
    img.loading = 'lazy';
    // NO lightbox click – user wants just scroll
    p.appendChild(img);
    wrap.appendChild(p);
    const sep = document.createElement('div');
    sep.className = 'sep';
    wrap.appendChild(sep);
  }

  async function scan(){
    buildSkeleton();

    for(let n=1;n<300;n++){
      let ok = false;
      for(const ext of tryExt){
        const path = `${folder}${base}${idx}.${ext}`;
        if(await exists(path)){
          addImg(path);
          ok = true;
          break;
        }
      }
      if(!ok){
        miss++;
        if(miss>=6) break;
      }else{
        miss = 0;
      }
      idx++;
    }

    loader.style.opacity = '0';
    setTimeout(()=> loader.remove(), 300);
  }

  scan();
})();

/* --------- FLOATING SCROLL CONTROL ----------- */
(function(){
  const viewer = document.getElementById('viewer');
  const btn    = document.getElementById('mainBtn');
  const arrow  = document.getElementById('arrowPath');
  const float  = document.getElementById('floatSingle');

  function botRemain(){
    return viewer.scrollHeight - (viewer.scrollTop + viewer.clientHeight);
  }

  function goTop(){
    viewer.scrollTo({top:0,behavior:'smooth'});
  }

  function goBottom(){
    viewer.scrollTo({top:viewer.scrollHeight,behavior:'smooth'});
  }

  function updateIcon(){
    // near bottom -> show UP double chevron; else DOWN
    if(botRemain() < 80){
      arrow.setAttribute('d','M7 15l5-5 5 5M7 11l5-5 5 5'); // up
    }else{
      arrow.setAttribute('d','M7 9l5 5 5-5M7 13l5 5 5-5'); // down
    }
  }

  btn.addEventListener('click',()=>{
    if(botRemain() < 80) goTop(); else goBottom();
    show();
  });

  let timer = null;
  function show(){
    float.classList.remove('float-hidden');
    if(timer) clearTimeout(timer);
    timer = setTimeout(()=> float.classList.add('float-hidden'), 2200);
  }

  viewer.addEventListener('scroll',()=>{ updateIcon(); show(); });
  viewer.addEventListener('mousemove',show);
  viewer.addEventListener('touchstart',show);

  updateIcon();
  show();
})();

/* --------- SOCIAL MENU (CLICK TO OPEN, CLICK OUTSIDE TO CLOSE) ----------- */
(function(){
  const socialBtn  = document.getElementById('socialBtn');
  const socialMenu = document.getElementById('socialMenu');
  const viewer     = document.getElementById('viewer');

  let isOpen = false;

  function openMenu(){
    socialMenu.classList.add('open');
    isOpen = true;
  }

  function closeMenu(){
    socialMenu.classList.remove('open');
    isOpen = false;
  }

  socialBtn.addEventListener('click', (e)=>{
    e.stopPropagation();
    if(isOpen) closeMenu(); else openMenu();
  });

  socialMenu.addEventListener('click', (e)=>{
    e.stopPropagation(); // clicking inside menu won't close
  });

  // click outside anywhere -> close
  document.addEventListener('click', ()=>{
    if(isOpen) closeMenu();
  });

  // scrolling also closes the menu
  viewer.addEventListener('scroll', ()=>{
    if(isOpen) closeMenu();
  });
})();
</script>

</body>
</html>
