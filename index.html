<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Portfolio</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root { --bg: #ffffff; --maxw:1200px; --gap:0px; }
    html,body{height:100%;margin:0;background:var(--bg);color:#fff;font-family:system-ui,Segoe UI,Roboto,Arial;}
    .wrap{max-width:var(--maxw);margin:0 auto;padding:0;box-sizing:border-box;}
    /* each page block — zero margins so pages touch */
    .page { margin: 0; display:block; width:100%; line-height:0; background:transparent; }
    .page img{ width:100%; height:auto; display:block; border:0; margin:0; padding:0; background:transparent; }
    /* loader message */
    .loader { color:#cfd8e3; text-align:center; padding:36px 16px; font-weight:700; }
    /* lightbox */
    .lb { position:fixed; inset:0; background:rgba(0,0,0,0.95); display:flex; align-items:center; justify-content:center; z-index:9999; }
    .lb img{ max-width:98vw; max-height:96vh; width:auto; height:auto; box-shadow:0 20px 80px rgba(0,0,0,0.9); }
    .lb-close { position:fixed; top:18px; right:18px; color:#fff; font-weight:700; background:rgba(255,255,255,0.04); padding:8px 12px; border-radius:8px; cursor:pointer; z-index:10000; }
    /* small-screen padding */
    @media (max-width:700px){ .wrap{padding:0 8px} }
  </style>
</head>
<body>
  <div class="wrap" id="wrap">
    <div id="loader" class="loader">Loading Portfolio…</div>
  </div>

  <script>
  (function(){
    // Configuration
    const folder = 'assets/pages/';    // folder where you upload images
    const baseName = 'page-';          // base name pattern -> page-1.png, page-2.png, ...
    const startIndex = 1;              // first page index
    const maxAttempts = 200;           // safety upper bound for attempts
    const consecutiveMissingStop = 8;  // stop after this many consecutive missing files
    const tryExtensions = ['png','jpg','webp','gif']; // tried in order for each index

    const wrap = document.getElementById('wrap');
    const loader = document.getElementById('loader');

    // Helper to attempt to load a URL, returns promise that resolves true if loaded (img onload), false if not (onerror)
    function testImage(url, timeout = 8000){
      return new Promise((resolve) => {
        const img = new Image();
        let done = false;
        const timer = setTimeout(()=>{ if(!done){ done = true; img.src = ''; resolve(false); } }, timeout);
        img.onload = ()=>{ if(!done){ done = true; clearTimeout(timer); resolve(true); } };
        img.onerror = ()=>{ if(!done){ done = true; clearTimeout(timer); resolve(false); } };
        img.decoding = 'async';
        img.src = url;
      });
    }

    // Create page element and append to DOM (lazy loading)
    function appendImage(src, altText){
      const page = document.createElement('div');
      page.className = 'page';
      const img = document.createElement('img');
      img.loading = 'lazy';
      img.decoding = 'async';
      img.alt = altText || '';
      img.src = src;
      // open in lightbox when clicked
      img.addEventListener('click', ()=>openLightbox(src));
      page.appendChild(img);
      wrap.appendChild(page);
    }

    // Simple lightbox
    function openLightbox(src){
      const existing = document.querySelector('.lb');
      if(existing) existing.remove();
      const lb = document.createElement('div'); lb.className = 'lb';
      const img = document.createElement('img'); img.src = src;
      const close = document.createElement('div'); close.className = 'lb-close'; close.textContent = 'Close';
      close.onclick = ()=>document.body.removeChild(lb);
      lb.onclick = (e)=>{ if(e.target === lb) document.body.removeChild(lb); };
      lb.appendChild(img); lb.appendChild(close);
      document.body.appendChild(lb);
    }

    // Core: scan sequentially and append found images
    (async function scanAndRender(){
      loader.textContent = 'Scanning images…';
      let index = startIndex;
      let consecutiveMissing = 0;
      let foundAny = false;

      for(let attempt=0; attempt < maxAttempts; attempt++, index++){
        let foundForIndex = false;

        for(const ext of tryExtensions){
          const url = folder + baseName + index + '.' + ext;
          // test quickly if image exists
          // On GitHub Pages this should return the image if present
          // We use testImage which loads the image; it's okay since images will be appended later (cached)
          const ok = await testImage(url, 6000);
          if(ok){
            // append this url and mark found
            appendImage(url, `Page ${index}`);
            foundForIndex = true;
            foundAny = true;
            consecutiveMissing = 0;
            break; // stop checking other extensions for this index
          }
        }

        if(!foundForIndex){
          consecutiveMissing++;
        }

        // stop if we've seen enough consecutive missing files (no more pages)
        if(consecutiveMissing >= consecutiveMissingStop) break;
      }

      // finished scanning
      if(!foundAny){
        loader.textContent = 'No images found. Upload images named like: ' + folder + baseName + '1.png';
      }else{
        loader.style.display = 'none';
      }
    })();

  })();
  </script>
</body>
</html>
