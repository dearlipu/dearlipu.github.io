<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Portfolio</title>

<style>
  html,body{
    height:100%;margin:0;padding:0;overflow-x:hidden;background:#000;
    font-family:-apple-system,system-ui,Segoe UI,Roboto,sans-serif;
  }

  #viewer{
    width:100vw;height:100vh;overflow:auto;-webkit-overflow-scrolling:touch;
    margin:0;padding:0;box-sizing:border-box;
  }

  .wrap{width:100%;margin:0;padding:0;}

  .page{margin:0;padding:0;line-height:0;}
  .page img{
    width:100vw;height:auto;margin:0;border:0;display:block;
    object-fit:cover;user-select:none;
  }

  .sep{height:0;margin:0;padding:0;}

  #loader{
    position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.6);padding:12px 16px;color:#fff;
    font-weight:700;border-radius:10px;z-index:9999;
  }

  .lb{
    position:fixed;inset:0;background:rgba(0,0,0,0.95);
    display:flex;align-items:center;justify-content:center;z-index:9998;
  }
  .lb img{
    max-width:96vw;max-height:96vh;box-shadow:0 20px 80px rgba(0,0,0,0.8);
  }
  .lb-close{
    position:fixed;top:16px;right:16px;padding:8px 12px;color:#fff;
    background:rgba(255,255,255,0.08);border-radius:10px;cursor:pointer;
    z-index:9999;font-weight:700;
  }

  /* === Make both controls circular, equal height, aligned === */
/* change size here if you want larger/smaller */
:root { --float-size: 56px; --float-gap: 10px; }

/* container slightly adjusted to avoid being covered by scrollbar */
#floatSingle {
  right: 18px;
  bottom: 20px;
  gap: var(--float-gap);
  /* keep pointer-events:none for container; buttons remain interactive */
  pointer-events: none;
}

/* MAIN circular button */
#mainBtn {
  pointer-events: auto;
  width: var(--float-size);
  height: var(--float-size);
  min-width: var(--float-size);
  min-height: var(--float-size);
  border-radius: 50%;
  padding: 0;
  display: grid;
  place-items: center;
  background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.03));
  border: 1px solid rgba(255,255,255,0.18);
  box-shadow: 0 16px 44px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.03);
  transition: transform .18s, box-shadow .18s, opacity .18s;
  transform-origin: center;
  position: relative;
  color: #fff;
}

/* keep subtle glow ring but shrink so it fits circle */
#mainBtn::before{
  inset: -6px;
  border-radius: 999px;
  filter: blur(12px);
}

/* scale + hover */
#mainBtn:hover{ transform: translateY(-4px) scale(1.03); }
#mainBtn:active{ transform: translateY(-1px) scale(.99); }

/* make icon centered and slightly bigger for clarity */
#mainBtn svg { width: 22px; height:22px; }
#mainBtn svg path { stroke-width: 1.9; }

/* DOWNLOAD button as circle to match main button */
#downloadMini {
  pointer-events: auto;
  width: var(--float-size);
  height: var(--float-size);
  min-width: var(--float-size);
  min-height: var(--float-size);
  border-radius: 50%;
  padding: 0;
  display: grid;
  place-items: center;
  background: linear-gradient(180deg, rgba(124,58,237,0.20), rgba(91,33,182,0.22));
  border: 1px solid rgba(0,0,0,0.12);
  box-shadow: 0 12px 32px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.05);
  color: #fff;
  text-decoration: none;
  font-weight:700;
  transition: transform .18s, box-shadow .18s, opacity .18s;
  transform: translateX(0); /* don't tuck it; keep aligned */
}

/* show chevron or small icon inside; hide long label text if present */
#downloadMini .dl-label { display: none !important; }
#downloadMini .dl-chevron { display: inline-block; font-size: 16px; transform: translateY(0); }

/* hover effect */
#downloadMini:hover { transform: translateY(-4px) scale(1.03); box-shadow: 0 18px 46px rgba(124,58,237,0.16); }

/* Auto-hide class (keeps same transitions) */
.float-hidden { opacity: 0; transform: translateY(12px) scale(.96); pointer-events: none; }

/* Small screen tweak */
@media (max-width:420px){
  :root { --float-size: 50px; --float-gap: 8px; }
  #downloadMini .dl-chevron { font-size: 15px; }
  #mainBtn svg { width: 20px; height: 20px; }
}
  
  .float-hidden{
    opacity:0;transform:translateY(12px) scale(0.95);pointer-events:none;
  }

</style>
</head>

<body>

<div id="loader">Loading…</div>
<div id="viewer"><div class="wrap" id="wrap"></div></div>


<!-- --------- FLOATING BUTTON GROUP ----------- -->
<div id="floatSingle">
  <a id="downloadMini" href="portfolio.pdf" download>Resume ⤵</a>

  <button id="mainBtn">
    <svg id="mainIcon" width="26" height="26" viewBox="0 0 24 24">
      <path id="arrowPath" d="M6 15l6-6 6 6"></path>
    </svg>
  </button>
</div>


<script>
/* --------- IMAGE LOADER ----------- */
(function(){
  const wrap = document.getElementById('wrap');
  const loader = document.getElementById('loader');
  const folder='assets/pages/'; const base='page-'; const tryExt=['png','jpg','webp','gif'];
  let idx=1, miss=0;

  function exists(url){ return new Promise(res=>{ let i=new Image(); i.onload=()=>res(true); i.onerror=()=>res(false); i.src=url; }); }

  function addImg(url){
    let p=document.createElement('div'); p.className='page';
    let img=document.createElement('img'); img.src=url; img.loading='lazy';
    img.onclick=()=>openLightbox(url);
    p.appendChild(img); wrap.appendChild(p);
    wrap.appendChild(Object.assign(document.createElement('div'),{className:'sep'}));
  }

  async function scan(){
    let found=false;
    for(let n=1;n<300;n++){
      let ok=false;
      for(const ext of tryExt){
        let path=`${folder}${base}${idx}.${ext}`;
        if(await exists(path)){ addImg(path); ok=true; break; }
      }
      if(!ok){ miss++; if(miss>=6) break; }
      else{ miss=0; found=true; }
      idx++;
    }
    loader.style.display='none';
  }
  scan();
})();


/* --------- LIGHTBOX ----------- */
function openLightbox(src){
  let old=document.querySelector('.lb'); if(old) old.remove();
  let lb=document.createElement('div'); lb.className='lb';
  let img=document.createElement('img'); img.src=src;
  let cls=document.createElement('div'); cls.className='lb-close'; cls.innerText='Close';
  cls.onclick=()=>lb.remove();
  lb.onclick=e=>{ if(e.target===lb) lb.remove(); };
  lb.appendChild(img); lb.appendChild(cls); document.body.appendChild(lb);
}


/* --------- FLOATING CONTROL LOGIC ----------- */
(function(){
  const viewer=document.getElementById('viewer');
  const btn=document.getElementById('mainBtn');
  const arrow=document.getElementById('arrowPath');
  const float=document.getElementById('floatSingle');

  function topPos(){ return viewer.scrollTop; }
  function botRemain(){ return viewer.scrollHeight-(viewer.scrollTop+viewer.clientHeight); }

  function goTop(){ viewer.scrollTo({top:0,behavior:'smooth'}); }
  function goBottom(){ viewer.scrollTo({top:viewer.scrollHeight,behavior:'smooth'}); }

  function updateIcon(){
    arrow.setAttribute('d', botRemain()<80 ? 'M6 15l6-6 6 6' : 'M6 9l6 6 6-6');
  }

  btn.onclick=()=> botRemain()<80 ? goTop() : goBottom();

  let timer=null;
  function show(){
    float.classList.remove('float-hidden');
    if(timer) clearTimeout(timer);
    timer=setTimeout(()=>float.classList.add('float-hidden'),2100);
  }

  viewer.addEventListener('scroll',()=>{ updateIcon(); show(); });
  viewer.addEventListener('mousemove',show);
  viewer.addEventListener('touchstart',show);

  updateIcon(); show();
})();
</script>

</body>
</html>
