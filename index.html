<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Saurav Panda - Portfolio</title>
  <meta name="description" content="Visual portfolio of Saurav Panda — artist, museum manager, content creator and tech support (NextGen).">
  <meta name="keywords" content="Saurav Panda, dearlipu, OdiArt Museum, NextGen, portfolio, photography, art, tech support">

  <style>
    html,body{
      height:100%;
      margin:0;
      padding:0;
      overflow-x:hidden;
      background:#000;
      font-family:-apple-system,system-ui,Segoe UI,Roboto,sans-serif;
    }

    #viewer{
      width:100vw;
      height:100vh;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    .wrap{
      width:100%;
      margin:0;
      padding:0;
    }

    .page{
      margin:0;
      padding:0;
      line-height:0;
    }

    .page img{
      width:100vw;
      height:auto;
      margin:0;
      border:0;
      display:block;
      object-fit:cover;
      user-select:none;
    }

    .sep{
      height:0;
      margin:0;
      padding:0;
    }

    /* -------- PREMIUM SKELETON LOADER OVERLAY -------- */
    #loader{
      position:fixed;
      inset:0;
      background:radial-gradient(circle at top,#191919 0,#000 55%);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:18px;
      z-index:9999;
      padding:20px;
      box-sizing:border-box;
      color:#fff;
      text-align:center;
    }

    .loader-title{
      font-size:18px;
      font-weight:600;
      letter-spacing:.04em;
      text-transform:uppercase;
      opacity:.85;
    }

    .loader-sub{
      font-size:13px;
      opacity:.65;
      margin-bottom:8px;
    }

    .skeleton-row{
      display:flex;
      flex-direction:column;
      gap:14px;
      width:100%;
      max-width:900px;
    }

    .skeleton-page{
      border-radius:20px;
      background:rgba(10,10,10,0.9);
      padding:16px;
      box-shadow:0 22px 60px rgba(0,0,0,0.80);
      border:1px solid rgba(255,255,255,0.04);
      overflow:hidden;
    }

    .sk-thumb{
      height:190px;
      border-radius:16px;
      margin-bottom:12px;
    }

    .sk-line{
      height:10px;
      border-radius:999px;
      margin-bottom:8px;
    }

    .sk-line:last-child{
      margin-bottom:0;
    }

    .sk-line.w1{ width:78%; }
    .sk-line.w2{ width:62%; }
    .sk-line.w3{ width:90%; }
    .sk-line.w4{ width:48%; }

    .sk-thumb,
    .sk-line{
      background-image:linear-gradient(110deg,#222 0%,#333 40%,#111 80%);
      background-size:200% 100%;
      animation:skeleton-loading 1.25s infinite linear;
    }

    @keyframes skeleton-loading{
      0%{ background-position-x:-120%; }
      100%{ background-position-x:120%; }
    }

    /* Desktop: bigger & more spread */
    @media (min-width: 900px){
      .skeleton-row{
        flex-direction:row;
      }
      .skeleton-page{
        flex:1;
      }
      .sk-thumb{
        height:min(360px,45vh);
      }
    }

    /* ---- GLASS FLOATING CONTROLS (RIGHT) ---- */
    #floatSingle{
      position:fixed;
      right:20px;
      bottom:20px;
      z-index:14000;
      display:flex;
      align-items:center;
      gap:12px;
      pointer-events:none;
    }

    .glass-btn{
      pointer-events:auto;
      width:44px;
      height:44px;
      border-radius:100px;
      background:linear-gradient(180deg,rgba(255,255,255,0.12),rgba(255,255,255,0.02));
      border:1px solid rgba(255,255,255,0.22);
      backdrop-filter:blur(16px) saturate(180%);
      -webkit-backdrop-filter:blur(16px) saturate(180%);
      box-shadow:0 14px 40px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.05);
      display:grid;
      place-items:center;
      cursor:pointer;
      color:#fff;
      transition:transform .20s, box-shadow .20s, opacity .20s;
      position:relative;
    }

    .glass-btn::before{
      content:'';
      position:absolute;
      inset:-8px;
      border-radius:28px;
      background:linear-gradient(90deg,rgba(124,58,237,0.16),rgba(6,182,212,0.16));
      filter:blur(18px);
      opacity:0;
      transition:opacity .25s;
    }
    .glass-btn:hover::before{
      opacity:1;
    }

    .glass-btn:hover{
      transform:translateY(-6px) scale(1.03);
    }
    .glass-btn:active{
      transform:scale(0.96);
    }

    #mainBtn svg path{
      stroke:white;
      stroke-width:2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .float-hidden{
      opacity:0;
      transform:translateY(12px) scale(0.95);
      pointer-events:none;
    }

    /* ---- SOCIAL FLOAT (LEFT) ---- */
    #socialFloat{
      position:fixed;
      left:20px;
      bottom:20px;
      z-index:14000;
      display:flex;
      align-items:flex-end;
      gap:10px;
      pointer-events:none;
      transition:opacity .2s ease, transform .2s ease;
    }

    #socialBtn{
      pointer-events:auto;
    }

    #socialBtn svg path{
      stroke:white;
      stroke-width:2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    /* Pill-style glass menu with icons (darker, vertical) */
    #socialMenu{
      position:absolute;
      bottom:54px;
      left:0;
      padding:8px 6px;
      border-radius:16px;
      background:linear-gradient(180deg,rgba(5,5,5,0.98),rgba(0,0,0,0.99));
      border:1px solid rgba(255,255,255,0.10);
      box-shadow:0 18px 55px rgba(0,0,0,0.85);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;
      opacity:0;
      transform:translateY(10px) scale(0.97);
      pointer-events:none;
      transition:opacity .18s ease, transform .18s ease;
    }

    #socialMenu.open{
      opacity:1;
      transform:translateY(0) scale(1);
      pointer-events:auto;
    }

    .social-item{
      width:36px;
      height:36px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,0.04);
      cursor:pointer;
      text-decoration:none;
      position:relative;
    }

    .social-item svg{
      width:18px;
      height:18px;
      fill:none;
      stroke:#f5f5f5;
      stroke-width:1.7;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .social-item:hover{
      background:rgba(255,255,255,0.12);
    }

    .social-item::after{
      content:attr(data-label);
      position:absolute;
      left:44px;
      top:50%;
      transform:translateY(-50%);
      background:rgba(0,0,0,0.9);
      color:#f5f5f5;
      padding:3px 8px;
      border-radius:999px;
      font-size:10px;
      letter-spacing:.04em;
      text-transform:uppercase;
      opacity:0;
      pointer-events:none;
      white-space:nowrap;
      transition:opacity .15s ease, transform .15s ease;
    }

    .social-item:hover::after{
      opacity:1;
      transform:translateY(-50%) translateX(2px);
    }

    /* Smaller tooltips on mobile */
    @media (max-width:600px){
      .social-item::after{
        display:none;
      }
    }

    /* Resume Pill - moved to left, with glow */
    #downloadMini{
      pointer-events:auto;
      display:flex;
      align-items:center;
      gap:8px;
      height:44px;
      padding:0 14px;
      border-radius:999px;
      background:linear-gradient(180deg,rgba(255,255,255,0.10),rgba(255,255,255,0.03));
      border:1px solid rgba(255,255,255,0.18);
      backdrop-filter:blur(16px) saturate(180%);
      -webkit-backdrop-filter:blur(16px) saturate(180%);
      box-shadow:0 14px 40px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.05);
      color:#fff;
      text-decoration:none;
      font-weight:400;
      font-size:15px;
      transform:translateX(0);
      transition:transform .20s, opacity .20s;
      white-space:nowrap;
      position:relative;
    }

    #downloadMini::before{
      content:'';
      position:absolute;
      inset:-8px;
      border-radius:999px;
      background:linear-gradient(90deg,rgba(124,58,237,0.16),rgba(6,182,212,0.16));
      filter:blur(18px);
      opacity:0;
      transition:opacity .25s;
      z-index:-1;
    }

    #downloadMini:hover::before{
      opacity:1;
    }

    #downloadMini:hover{
      transform:translateY(-4px);
    }

    #downloadMini:active{
      transform:translateY(-1px) scale(0.98);
    }
  </style>
</head>

  <script>
  /* --------- IMAGE LOADER ----------- */
  (function(){
    const wrap   = document.getElementById('wrap');
    const loader = document.getElementById('loader');
    const folder = 'assets/pages/';
    const base   = 'page-';
    const tryExt = ['png','jpg','webp','gif'];

    let idx  = 1;
    let miss = 0;

    function exists(url){
      return new Promise(res => {
        const i = new Image();
        i.onload  = () => res(true);
        i.onerror = () => res(false);
        i.src = url;
      });
    }

    function addImg(url){
      const p   = document.createElement('div');
      p.className = 'page';

      const img = document.createElement('img');
      img.src   = url;
      img.loading = 'lazy';

      p.appendChild(img);
      wrap.appendChild(p);

      const sep = document.createElement('div');
      sep.className = 'sep';
      wrap.appendChild(sep);
    }

    function buildSkeleton(){
      loader.innerHTML = '';

      const title = document.createElement('div');
      title.className = 'loader-title';
      title.textContent = 'Preparing portfolio for you…';

      const sub = document.createElement('div');
      sub.className = 'loader-sub';
      sub.textContent = 'Loading high-resolution pages';

      const row = document.createElement('div');
      row.className = 'skeleton-row';

      for(let i=0;i<3;i++){
        const card = document.createElement('div');
        card.className = 'skeleton-page';
        card.innerHTML = `
          <div class="sk-thumb"></div>
          <div class="sk-line w1"></div>
          <div class="sk-line w3"></div>
          <div class="sk-line w2"></div>
          <div class="sk-line w4"></div>
        `;
        row.appendChild(card);
      }

      loader.appendChild(title);
      loader.appendChild(sub);
      loader.appendChild(row);
    }

    async function scan(){
      buildSkeleton();

      for(let n=1;n<300;n++){
        let ok = false;
        for(const ext of tryExt){
          const path = `${folder}${base}${idx}.${ext}`;
          // eslint-disable-next-line no-await-in-loop
          if(await exists(path)){
            addImg(path);
            ok = true;
            break;
          }
        }
        if(!ok){
          miss++;
          if(miss>=6) break;   // stop if several consecutive pages missing
        } else {
          miss = 0;
        }
        idx++;
      }

      loader.style.transition = 'opacity 0.3s ease';
      loader.style.opacity = '0';
      setTimeout(() => loader.remove(), 300);
    }

    scan();
  })();

  /* --------- FLOATING + SOCIAL LOGIC (SCROLL + AUTOHIDE) ----------- */
  (function(){
    const viewer      = document.getElementById('viewer');
    const btn         = document.getElementById('mainBtn');
    const arrow       = document.getElementById('arrowPath');
    const floatRight  = document.getElementById('floatSingle');
    const floatLeft   = document.getElementById('socialFloat');
    const socialMenu  = document.getElementById('socialMenu');
    const socialBtn   = document.getElementById('socialBtn');

    const UP_PATH   = 'M12 17 L12 7 M8 11 L12 7 L16 11';
    const DOWN_PATH = 'M12 7 L12 17 M8 13 L12 17 L16 13';

    let hideTimer = null;

    function botRemain(){
      return viewer.scrollHeight - (viewer.scrollTop + viewer.clientHeight);
    }

    function goTop(){
      viewer.scrollTo({top:0, behavior:'smooth'});
    }

    function goBottom(){
      viewer.scrollTo({top:viewer.scrollHeight, behavior:'smooth'});
    }

    function updateIcon(){
      arrow.setAttribute('d', botRemain() < 80 ? UP_PATH : DOWN_PATH);
    }

    function clearHideTimer(){
      if(hideTimer){
        clearTimeout(hideTimer);
        hideTimer = null;
      }
    }

    function scheduleHide(){
      clearHideTimer();

      // If social menu is open, do NOT auto-hide
      if(socialMenu && socialMenu.classList.contains('open')) return;

      hideTimer = setTimeout(() => {
        floatRight.classList.add('float-hidden');
        floatLeft.classList.add('float-hidden');
      }, 2100);
    }

    function showFloats(){
      floatRight.classList.remove('float-hidden');
      floatLeft.classList.remove('float-hidden');
      scheduleHide();
    }

    btn.onclick = () => botRemain() < 80 ? goTop() : goBottom();

    viewer.addEventListener('scroll', () => {
      updateIcon();
      showFloats();
    });
    viewer.addEventListener('mousemove', showFloats);
    viewer.addEventListener('touchstart', showFloats);

    /* --------- SOCIAL DROPDOWN LOGIC (SHARED TIMER) ----------- */
    function openMenu(){
      socialMenu.classList.add('open');
      clearHideTimer();                   // keep visible
      floatLeft.classList.remove('float-hidden');
      floatRight.classList.remove('float-hidden');
    }

    function closeMenu(){
      socialMenu.classList.remove('open');
      scheduleHide();                     // resume normal auto-hide
    }

    function toggleMenu(e){
      e.stopPropagation();
      if(socialMenu.classList.contains('open')){
        closeMenu();
      } else {
        openMenu();
      }
    }

    socialBtn.addEventListener('click', toggleMenu);

    // Close when clicking any social item
    document.querySelectorAll('#socialMenu .social-item').forEach(item => {
      item.addEventListener('click', () => {
        closeMenu();
      });
    });

    // Close when click outside
    document.addEventListener('click', (e) => {
      if(!floatLeft.contains(e.target)){
        if(socialMenu.classList.contains('open')){
          closeMenu();
        }
      }
    });

    // initial
    updateIcon();
    showFloats();
  })();
  </script>
