<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfjs-dist/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdfjs-dist/3.11.174/pdf.worker.min.js';
    </script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        #pdf-container {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
        }
        canvas {
            display: block;
            margin: 0;
            padding: 0;
            border: none;
        }
        #zoom-controls {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
        }
        button {
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            padding: 5px 10px;
            margin: 0 2px;
            cursor: pointer;
        }
        button:hover {
            background: rgba(0,0,0,0.7);
        }
    </style>
</head>
<body>
    <div id="zoom-controls">
        <button id="zoom-in">+</button>
        <button id="zoom-out">-</button>
        <button id="zoom-reset">Reset</button>
    </div>
    <div id="pdf-container"></div>
    <script>
        let pdfDoc = null;
        let scale = 1.0;
        const container = document.getElementById('pdf-container');
        const zoomInBtn = document.getElementById('zoom-in');
        const zoomOutBtn = document.getElementById('zoom-out');
        const zoomResetBtn = document.getElementById('zoom-reset');

        async function loadPDF() {
            try {
                const response = await fetch('portfolio.pdf');
                const arrayBuffer = await response.arrayBuffer();
                pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                renderPDF();
            } catch (error) {
                console.error('Error loading PDF:', error);
            }
        }

        async function renderPDF() {
            container.innerHTML = '';
            for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum++) {
                const page = await pdfDoc.getPage(pageNum);
                const viewport = page.getViewport({ scale: scale });
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                canvas.style.width = '100%';
                canvas.style.height = 'auto';
                container.appendChild(canvas);
                await page.render({ canvasContext: context, viewport: viewport }).promise;
            }
        }

        zoomInBtn.addEventListener('click', () => {
            scale += 0.1;
            renderPDF();
        });

        zoomOutBtn.addEventListener('click', () => {
            if (scale > 0.1) {
                scale -= 0.1;
                renderPDF();
            }
        });

        zoomResetBtn.addEventListener('click', () => {
            scale = 1.0;
            renderPDF();
        });

        loadPDF();
    </script>
</body>
</html>
