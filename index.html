<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Portfolio — Continuous Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html,body{
      height:100%;
      margin:0;
      background:#0d0d0d;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial;
      overflow:hidden;
    }

    #viewerContainer{
      width:100%;
      height:100vh;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      padding:0;
      margin:0;
    }

    .pdfPageCanvas{
      display:block;
      margin:0 auto;
      padding:0;
      border:0;
      background:transparent;
    }

    .pageWrapper{
      margin:0;
      padding:0;
      line-height:0;
      display:block;
    }

    .pageSeparator{
      height:0px; /* zero gap */
      margin:0;
      background:transparent;
      padding:0;
    }

    #loading{
      position:fixed;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      background:rgba(0,0,0,0.75);
      padding:14px 18px;
      border-radius:8px;
      font-size:16px;
      font-weight:600;
      color:#fff;
      z-index:9999;
    }

    #controls{
      position:fixed;
      right:15px;
      bottom:15px;
      z-index:9999;
      display:flex;
      gap:10px;
    }

    .btn{
      background:#111;
      color:#fff;
      padding:8px 12px;
      border-radius:6px;
      border:1px solid rgba(255,255,255,0.1);
      cursor:pointer;
      user-select:none;
      font-weight:600;
    }
  </style>
</head>

<body>

  <div id="loading">Loading PDF… <span id="progress"></span></div>

  <div id="viewerContainer"></div>

  <div id="controls">
    <div class="btn" id="zoomOut">−</div>
    <div class="btn" id="zoomReset">100%</div>
    <div class="btn" id="zoomIn">+</div>
    <a class="btn" href="portfolio.pdf" target="_blank">Download</a>
  </div>

  <!-- PDF.js -->
  <script src="https://unpkg.com/pdfjs-dist@3.10.100/build/pdf.min.js"></script>

  <script>
    const PDF_URL = 'portfolio.pdf'; // your PDF file name
    const viewer = document.getElementById('viewerContainer');
    const loading = document.getElementById('loading');
    const progressEl = document.getElementById('progress');

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://unpkg.com/pdfjs-dist@3.10.100/build/pdf.worker.min.js";

    let pdfDoc = null;
    let currentScale = 1.0;
    const SCALE_STEP = 0.10;

    async function renderPage(num){
      const page = await pdfDoc.getPage(num);

      const viewport = page.getViewport({scale:1.0});
      const containerWidth = Math.min(viewer.clientWidth, window.innerWidth);
      const desiredWidth = containerWidth * 0.95;

      let scale = desiredWidth / viewport.width;
      scale *= currentScale;

      const scaledViewport = page.getViewport({scale:scale});

      const wrap = document.createElement("div");
      wrap.className = "pageWrapper";

      const canvas = document.createElement("canvas");
      canvas.className = "pdfPageCanvas";

      canvas.width = scaledViewport.width;
      canvas.height = scaledViewport.height;
      wrap.appendChild(canvas);

      const separator = document.createElement("div");
      separator.className = "pageSeparator";

      viewer.appendChild(wrap);
      viewer.appendChild(separator);

      const ctx = canvas.getContext("2d",{alpha:false});
      await page.render({
        canvasContext:ctx,
        viewport:scaledViewport
      }).promise;
    }

    async function renderAllPages(){
      viewer.innerHTML = '';
      loading.style.display='flex';
      for(let i=1;i<=pdfDoc.numPages;i++){
        progressEl.textContent = `(${i}/${pdfDoc.numPages})`;
        await renderPage(i);
      }
      loading.style.display='none';
      viewer.scrollTop = 0;
    }

    (async ()=>{
      try{
        // FETCH PDF FIRST (fixes loading issues on GitHub Pages)
        const resp = await fetch(PDF_URL);
        if(!resp.ok) throw new Error("PDF fetch failed");
        const buffer = await resp.arrayBuffer();

        pdfDoc = await pdfjsLib.getDocument({data:buffer}).promise;
        await renderAllPages();
      }catch(err){
        console.error(err);
        loading.textContent = "Failed to load PDF. Click to open.";
        loading.onclick = ()=>window.open(PDF_URL,'_blank');
      }
    })();

    // Zoom controls
    document.getElementById("zoomIn").onclick = async ()=>{
      currentScale += SCALE_STEP;
      document.getElementById("zoomReset").textContent = Math.round(currentScale*100)+'%';
      await renderAllPages();
    };

    document.getElementById("zoomOut").onclick = async ()=>{
      currentScale = Math.max(0.20, currentScale-SCALE_STEP);
      document.getElementById("zoomReset").textContent = Math.round(currentScale*100)+'%';
      await renderAllPages();
    };

    document.getElementById("zoomReset").onclick = async ()=>{
      currentScale = 1.0;
      document.getElementById("zoomReset").textContent = '100%';
      await renderAllPages();
    };

    // Re-render on resize (debounced)
    let resizeTimer=null;
    window.onresize=()=>{
      clearTimeout(resizeTimer);
      resizeTimer=setTimeout(()=>renderAllPages(),300);
    };
  </script>

</body>
</html>
